<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISC Exam Prep | Olivia Borella</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* App-specific Coastal Styles */
        .app-container { max-width: 700px; margin: 50px auto; padding: 20px; }
        .stats-bar {
            background: var(--soft-sky);
            display: flex;
            justify-content: space-between;
            padding: 1.5rem;
            border-radius: 15px 15px 0 0;
            border: 1px solid var(--coastal-blue);
            font-weight: bold;
            color: var(--deep-ocean);
        }
        .quiz-body {
            background: white;
            padding: 2rem;
            border: 1px solid var(--soft-sky);
            border-top: none;
            border-radius: 0 0 15px 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid var(--soft-sky);
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: 0.3s;
        }
        .option-btn:hover { background: var(--soft-sky); border-color: var(--coastal-blue); }
        #progress-bar { height: 8px; background: var(--coastal-blue); width: 0%; border-radius: 4px; transition: 0.5s; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="stats-bar">
            <div>🔥 Streak: <span id="streak">0</span></div>
            <div>🏆 Rank: <span id="rank">Coastal Intern</span></div>
            <div>✨ XP: <span id="xp">0</span></div>
        </div>
        <div id="progress-bar"></div>

        <div class="quiz-body">
            <div id="meta" style="margin-bottom: 10px;">
                <span id="area-tag" class="tag" style="background: var(--soft-sky); padding: 5px 10px; border-radius: 10px; font-size: 0.7rem;">Area I</span>
            </div>
            
            <h3 id="question">Loading your first ISC question...</h3>
            
            <div id="options"></div>

            <div id="feedback" class="hidden" style="margin-top: 20px; padding: 15px; border-radius: 8px;">
                <p id="feedback-msg"></p>
                <p id="explanation" style="font-size: 0.85rem; color: #666;"></p>
                <button onclick="nextQuestion()" class="tag" style="background: var(--deep-ocean); color: white; border: none; cursor: pointer; padding: 10px 20px;">Next Question →</button>
            </div>
        </div>
        
        <p style="text-align: center; margin-top: 20px;">
            <a href="index.html" style="color: var(--coastal-blue); text-decoration: none;">← Back to Portfolio</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
