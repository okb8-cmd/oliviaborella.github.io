<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyond the Resume | Olivia Borella</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="stat-pill">✨ XP: <span id="xp">0</span></div>
            <div class="stat-pill">🔥 Streak: <span id="streak">0</span></div>
        </header>

        <div class="card">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <h1 style="color: #0077b6; font-size: 1.2rem; margin-top: 0;">Beyond the Resume: Get to Know Me!</h1>
            <h2 id="question">Loading...</h2>
            <div id="options" class="options-grid"></div>
            <div id="feedback" style="margin-top:15px; font-weight:bold;"></div>
            <button id="next" class="action-btn" onclick="nextQuestion()" style="display:none;">Next Question →</button>
        </div>

        <a href="../index.html" class="back-link">← Back to Portfolio</a>
    </div>
    <script src="script.js"></script>
</body>
</html>
