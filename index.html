<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivia Borella | Professional Portfolio</title>
    <style>
        :root {
            --coastal-blue: #a2d2ff;
            --deep-ocean: #0077b6;
            --soft-sky: #eaf6ff;
            --text-slate: #2c3e50;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Avenir', 'Segoe UI', sans-serif;
            margin: 0;
            background-color: var(--white);
            color: var(--text-slate);
            line-height: 1.6;
        }

        /* --- STICKY TOP NAVIGATION --- */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--soft-sky);
            display: flex;
            justify-content: center;
            padding: 15px 0;
        }

        nav a {
            margin: 0 20px;
            text-decoration: none;
            color: var(--deep-ocean);
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--coastal-blue); }

        /* --- HERO SECTION --- */
        header {
            background-image: url('Assets/Stripes.png');
            background-size: cover;
            background-position: center;
            height: 250px;
            width: 100%;
        }

        .profile-main {
            max-width: 900px;
            margin: -80px auto 2rem;
            background: rgba(255, 255, 255, 0.98);
            padding: 3rem 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 6px solid var(--white);
            margin-top: -120px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        .container { max-width: 800px; margin: 0 auto; padding: 0 20px; }
        
        h1 { font-size: 2.5rem; color: var(--deep-ocean); margin: 1rem 0 0; letter-spacing: 1px; }
        .subtitle { font-size: 1.1rem; color: var(--coastal-blue); font-weight: bold; margin-bottom: 1.5rem; }

        h2 { 
            color: var(--deep-ocean); 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 2px;
            border-bottom: 2px solid var(--soft-sky);
            padding-bottom: 8px;
            margin-top: 5rem;
        }

        .exp-item { margin-bottom: 2.5rem; }
        .exp-header { display: flex; justify-content: space-between; align-items: baseline; }
        .company { font-size: 1.2rem; font-weight: bold; }
        .role { color: var(--deep-ocean); font-style: italic; margin-bottom: 5px; }
        .date { font-size: 0.85rem; color: #888; }

        .info-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--soft-sky);
            margin-top: 1.5rem;
        }

        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .tag {
            background: var(--soft-sky);
            color: var(--deep-ocean);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .launch-btn {
            display: inline-block;
            margin-top: 15px;
            background: var(--deep-ocean);
            color: white !important;
            padding: 10px 25px;
